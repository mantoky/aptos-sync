<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Jogo da Velha+</title>
<style>
:root{--bg:#060818;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--accent:#a855f7;--x:#4fc3f7;--o:#ff6b6b;--text:#c8d8f0;--muted:#6d7f9b;--ok:#00e676}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at top,#1d1336,var(--bg) 60%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;user-select:none}
.wrap{width:100%;max-width:430px;text-align:center}.close{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}
h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.sub{color:var(--muted);font-size:.88rem;margin:8px 0 14px;line-height:1.45}
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}.mode{display:flex;gap:8px;margin-bottom:12px}.mode button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,.18);color:var(--muted);font-weight:800;cursor:pointer}.mode .on{color:#fff;border-color:var(--accent);background:rgba(168,85,247,.2)}
.status{font-weight:850;color:var(--accent);margin-bottom:12px;min-height:22px}.board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.cell{aspect-ratio:1;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.25);font-size:1.7rem;font-weight:900;color:var(--text);cursor:pointer}.cell.x{color:var(--x)}.cell.o{color:var(--o)}.cell.win{background:rgba(0,230,118,.15);border-color:var(--ok)}
.row{display:flex;gap:10px;margin-top:12px}.btn{flex:1;padding:13px;border:none;border-radius:10px;font-weight:850;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff}.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<button class="close" onclick="closeGame()">X</button>
<main class="wrap">
  <h1>Jogo da Velha+</h1>
  <p class="sub">Grade 5x5. Faca quatro em linha antes da IA.</p>
  <section class="panel">
    <div class="mode"><button id="easy" onclick="setMode('easy')">Leve</button><button id="normal" class="on" onclick="setMode('normal')">Normal</button><button id="hard" onclick="setMode('hard')">Dificil</button></div>
    <div class="status" id="status">Sua vez: X.</div>
    <div class="board" id="board"></div>
    <div class="row"><button class="btn primary" onclick="newGame()">Novo jogo</button><button class="btn secondary" onclick="closeGame()">Voltar</button></div>
  </section>
</main>
<script>
const N=5,NEED=4;let cells=[],locked=false,mode='normal',winLine=[];
function setMode(m){mode=m;['easy','normal','hard'].forEach(x=>document.getElementById(x).className=x===m?'on':'');newGame();}
function newGame(){cells=Array(N*N).fill('');locked=false;winLine=[];status('Sua vez: X.');render();}
function render(){const b=document.getElementById('board');b.innerHTML='';cells.forEach((v,i)=>{const d=document.createElement('button');d.className='cell '+(v==='X'?'x':v==='O'?'o':'')+(winLine.includes(i)?' win':'');d.textContent=v;d.onclick=()=>play(i);b.appendChild(d);});}
function status(t){document.getElementById('status').textContent=t;}
function play(i){if(locked||cells[i])return;cells[i]='X';if(done('X','Voce venceu!'))return;if(full())return finish('Empate.');locked=true;status('IA pensando...');setTimeout(ai,320);render();}
function ai(){let i=chooseMove();cells[i]='O';if(done('O','IA venceu.'))return;if(full())return finish('Empate.');locked=false;status('Sua vez: X.');render();}
function chooseMove(){const free=cells.map((v,i)=>v?null:i).filter(v=>v!==null);if(mode==='easy')return free[Math.floor(Math.random()*free.length)];for(const i of free){cells[i]='O';if(check('O').won){cells[i]='';return i;}cells[i]='';}for(const i of free){cells[i]='X';if(check('X').won){cells[i]='';return i;}cells[i]='';}if(mode==='hard')free.sort((a,b)=>score(b,'O')-score(a,'O'));else free.sort((a,b)=>center(b)-center(a));return free[0];}
function center(i){const r=Math.floor(i/N),c=i%N;return 10-Math.abs(2-r)-Math.abs(2-c)+Math.random();}
function score(i,p){cells[i]=p;let s=center(i);for(const line of linesThrough(i)){const vals=line.map(x=>cells[x]);const own=vals.filter(v=>v===p).length,opp=vals.filter(v=>v&&v!==p).length;if(!opp)s+=own*own*4;}cells[i]='';return s;}
function linesThrough(i){const r=Math.floor(i/N),c=i%N,dirs=[[1,0],[0,1],[1,1],[1,-1]],out=[];for(const[dr,dc]of dirs){for(let off=-(NEED-1);off<=0;off++){let line=[];for(let k=0;k<NEED;k++){const rr=r+(off+k)*dr,cc=c+(off+k)*dc;if(rr>=0&&rr<N&&cc>=0&&cc<N)line.push(rr*N+cc);}if(line.length===NEED)out.push(line);}}return out;}
function check(p){for(let i=0;i<cells.length;i++)for(const line of linesThrough(i))if(line.every(x=>cells[x]===p))return{won:true,line};return{won:false,line:[]};}
function done(p,msg){const r=check(p);if(r.won){winLine=r.line;finish(msg);return true}return false;}
function full(){return cells.every(Boolean)}
function finish(t){locked=true;status(t);render();}
function closeGame(){if(window.parent!==window)window.parent.postMessage({type:'BRAINHUNTER_CLOSE'},'*');else location.href='index.html';}
newGame();
</script>
</body>
</html>
