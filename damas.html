<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Damas</title>
<style>
:root{--bg:#060818;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--accent:#ff6b6b;--text:#c8d8f0;--muted:#6d7f9b;--dark:#121827;--light:#d8b27c;--red:#ff6b6b;--black:#101010;--ok:#00e676}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at top,#31121a,var(--bg) 60%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px;user-select:none}
.wrap{width:100%;max-width:430px;text-align:center}.close{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}
h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#fda4af);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.sub{color:var(--muted);font-size:.86rem;margin:8px 0 12px;line-height:1.4}.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px}
.status{font-weight:850;color:#fda4af;margin-bottom:10px;min-height:42px}.board{display:grid;grid-template-columns:repeat(8,1fr);border:3px solid #5b2b16;border-radius:14px;overflow:hidden}.sq{aspect-ratio:1;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer}.light{background:#c59b63}.dark{background:#42261c}.sel{box-shadow:inset 0 0 0 4px var(--ok)}.hint{box-shadow:inset 0 0 0 4px rgba(0,230,118,.45)}
.piece{width:78%;height:78%;border-radius:50%;box-shadow:0 5px 12px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900}.r{background:radial-gradient(circle at 30% 25%,#ffc4c4,var(--red) 48%,#8f1f2f)}.b{background:radial-gradient(circle at 30% 25%,#888,var(--black) 55%,#000);color:#fff}.king::after{content:'K';font-size:.8rem;color:#ffe66d;text-shadow:0 1px 3px #000}
.score{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.stat{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:12px;padding:8px}.stat b{font-size:1.3rem}.row{display:flex;gap:10px;margin-top:12px}.btn{flex:1;padding:12px;border:none;border-radius:10px;font-weight:850;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#be123c);color:#fff}.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<button class="close" onclick="closeGame()">X</button>
<main class="wrap">
  <h1>Damas</h1>
  <p class="sub">Voce joga com vermelhas. Capture as pecas pretas e promova suas damas.</p>
  <section class="panel">
    <div class="score"><div class="stat"><b id="red">12</b><br>vermelhas</div><div class="stat"><b id="black">12</b><br>pretas</div></div>
    <div class="status" id="status">Sua vez: selecione uma peca vermelha.</div>
    <div class="board" id="board"></div>
    <div class="row"><button class="btn primary" onclick="newGame()">Novo jogo</button><button class="btn secondary" onclick="closeGame()">Voltar</button></div>
  </section>
</main>
<script>
const N=8,R='r',B='b';let g=[],sel=null,locked=false,hints=[];
function newGame(){g=Array.from({length:N},()=>Array(N).fill(null));for(let r=0;r<3;r++)for(let c=0;c<N;c++)if((r+c)%2)g[r][c]={p:B,k:false};for(let r=5;r<8;r++)for(let c=0;c<N;c++)if((r+c)%2)g[r][c]={p:R,k:false};sel=null;locked=false;hints=[];status('Sua vez: selecione uma peca vermelha.');render();}
function render(){const b=document.getElementById('board');b.innerHTML='';for(let r=0;r<N;r++)for(let c=0;c<N;c++){const s=document.createElement('button');s.className='sq '+((r+c)%2?'dark':'light')+(sel&&sel.r===r&&sel.c===c?' sel':'')+(hints.some(m=>m.r===r&&m.c===c)?' hint':'');s.onclick=()=>clickSq(r,c);const pc=g[r][c];if(pc){const p=document.createElement('div');p.className='piece '+pc.p+(pc.k?' king':'');s.appendChild(p)}b.appendChild(s)}count();}
function clickSq(r,c){if(locked)return;const pc=g[r][c];if(sel&&hints.some(m=>m.r===r&&m.c===c)){move(sel.r,sel.c,r,c);return}if(pc&&pc.p===R){sel={r,c};hints=legal(r,c);status(hints.length?'Escolha uma casa destacada.':'Esta peca nao tem movimento.');render();}}
function dirs(pc){let d=[];if(pc.k||pc.p===R)d.push([-1,-1],[-1,1]);if(pc.k||pc.p===B)d.push([1,-1],[1,1]);return d}
function legal(r,c){const pc=g[r][c];if(!pc)return[];let caps=[],moves=[];for(const[dr,dc]of dirs(pc)){const r1=r+dr,c1=c+dc,r2=r+2*dr,c2=c+2*dc;if(inb(r1,c1)&&!g[r1][c1])moves.push({r:r1,c:c1});if(inb(r2,c2)&&g[r1]?.[c1]&&g[r1][c1].p!==pc.p&&!g[r2][c2])caps.push({r:r2,c:c2,cap:[r1,c1]});}return caps.length?caps:moves;}
function allMoves(p){let out=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(g[r][c]?.p===p)for(const m of legal(r,c))out.push({from:{r,c},to:m,capture:!!m.cap});const caps=out.filter(m=>m.capture);return caps.length?caps:out;}
function move(fr,fc,tr,tc){const pc=g[fr][fc];const cap=Math.abs(tr-fr)===2;g[tr][tc]=pc;g[fr][fc]=null;if(cap)g[(fr+tr)/2][(fc+tc)/2]=null;if(pc.p===R&&tr===0)pc.k=true;if(pc.p===B&&tr===N-1)pc.k=true;sel=null;hints=[];render();if(end())return;locked=true;status('IA pensando...');setTimeout(ai,450);}
function ai(){const ms=allMoves(B);if(!ms.length)return finish('Voce venceu! A IA ficou sem movimentos.');ms.sort((a,b)=>Number(b.capture)-Number(a.capture)+Math.random()-.5);const m=ms[0];moveAI(m.from.r,m.from.c,m.to.r,m.to.c);if(end())return;locked=false;status('Sua vez: selecione uma peca vermelha.');render();}
function moveAI(fr,fc,tr,tc){const pc=g[fr][fc];g[tr][tc]=pc;g[fr][fc]=null;if(Math.abs(tr-fr)===2)g[(fr+tr)/2][(fc+tc)/2]=null;if(tr===N-1)pc.k=true;render();}
function end(){const rc=countPieces(R),bc=countPieces(B);if(!bc)return finish('Voce venceu!');if(!rc)return finish('IA venceu.');if(!allMoves(R).length)return finish('Sem movimentos: IA venceu.');if(!allMoves(B).length)return finish('Sem movimentos: voce venceu!');return false}
function finish(t){locked=true;status(t);render();return true}
function countPieces(p){return g.flat().filter(x=>x&&x.p===p).length}function count(){document.getElementById('red').textContent=countPieces(R);document.getElementById('black').textContent=countPieces(B)}
function inb(r,c){return r>=0&&r<N&&c>=0&&c<N}function status(t){document.getElementById('status').textContent=t}
function closeGame(){if(window.parent!==window)window.parent.postMessage({type:'BRAINHUNTER_CLOSE'},'*');else location.href='index.html';}
newGame();
</script>
</body>
</html>
