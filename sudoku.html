<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Sudoku</title>
<style>
:root{--bg:#060818;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.12);--accent:#f97316;--text:#c8d8f0;--muted:#6d7f9b;--bad:#ff6b6b;--ok:#00e676}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at top,#311a0c,var(--bg) 60%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px;user-select:none}
.wrap{width:100%;max-width:430px;text-align:center}.close{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}
h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.sub{color:var(--muted);font-size:.86rem;margin:8px 0 12px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px}.bar{display:flex;gap:8px;margin-bottom:12px}.bar button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--text);font-weight:800;cursor:pointer}
.status{font-weight:850;color:var(--accent);margin-bottom:10px;min-height:22px}.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:0;border:3px solid rgba(249,115,22,.75);background:rgba(249,115,22,.75);border-radius:10px;overflow:hidden}
.cell{aspect-ratio:1;width:100%;border:1px solid rgba(255,255,255,.12);background:#0a1024;color:#d8e7ff;text-align:center;font-weight:850;font-size:1.1rem;outline:none}.cell:nth-child(3n){border-right-width:3px}.cell:nth-child(n+19):nth-child(-n+27),.cell:nth-child(n+46):nth-child(-n+54){border-bottom-width:3px}.given{background:#18213d;color:#fff}.bad{background:rgba(255,107,107,.22);color:#ffd2d2}.sel{box-shadow:inset 0 0 0 2px var(--accent)}
.nums{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:12px}.nums button{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.22);color:var(--text);font-weight:900;cursor:pointer}.row{display:flex;gap:10px;margin-top:12px}.btn{flex:1;padding:12px;border:none;border-radius:10px;font-weight:850;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#ea580c);color:#fff}.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<button class="close" onclick="closeGame()">X</button>
<main class="wrap">
  <h1>Sudoku</h1>
  <p class="sub">Complete a grade sem repetir numeros em linhas, colunas e blocos.</p>
  <section class="panel">
    <div class="bar"><button onclick="loadPuzzle(0)">Leve</button><button onclick="loadPuzzle(1)">Medio</button><button onclick="loadPuzzle(2)">Dificil</button><button onclick="checkBoard()">Checar</button></div>
    <div class="status" id="status">Toque em uma casa vazia.</div>
    <div class="grid" id="grid"></div>
    <div class="nums" id="nums"></div>
    <div class="row"><button class="btn primary" onclick="newSame()">Reiniciar</button><button class="btn secondary" onclick="closeGame()">Voltar</button></div>
  </section>
</main>
<script>
const PUZZLES=[
['530070000600195000098000060800060003400803001700020006060000280000419005000080079','534678912672195348198342567859761423426853791713924856961537284287419635345286179'],
['000260701680070090190004500820100040004602900050003028009300074040050036703018000','435269781682571493197834562826195347374682915951743628519326874248957136763418259'],
['100007090030020008009600500005300900010080002600004000300000010040000007007000300','162857493534129678879643521485312976713986452629574831356798214241365789997241365']
];let puzzle='',solution='',values=[],selected=-1,current=1;
function loadPuzzle(i){current=i;puzzle=PUZZLES[i][0];solution=PUZZLES[i][1];values=puzzle.split('').map(x=>x==='0'?'':x);selected=-1;status(['Leve','Medio','Dificil'][i]+' carregado.');render();}
function newSame(){loadPuzzle(current)}
function render(){const g=document.getElementById('grid');g.innerHTML='';values.forEach((v,i)=>{const inp=document.createElement('input');inp.className='cell '+(puzzle[i]!=='0'?'given ':'')+(selected===i?'sel ':'');inp.value=v;inp.readOnly=true;inp.onclick=()=>{if(puzzle[i]==='0'){selected=i;render();}};g.appendChild(inp);});const n=document.getElementById('nums');n.innerHTML='';for(let i=1;i<=9;i++){const b=document.createElement('button');b.textContent=i;b.onclick=()=>put(i);n.appendChild(b);}const e=document.createElement('button');e.textContent='X';e.onclick=()=>put('');n.appendChild(e);}
function put(n){if(selected<0)return;values[selected]=String(n||'');render();}
function status(t){document.getElementById('status').textContent=t;}
function checkBoard(){let bad=[];values.forEach((v,i)=>{if(v&&v!==solution[i])bad.push(i);});document.querySelectorAll('.cell').forEach((el,i)=>el.classList.toggle('bad',bad.includes(i)));if(bad.length)status('Ha '+bad.length+' casa(s) incorreta(s).');else if(values.join('')===solution)status('Perfeito. Sudoku concluido!');else status('Sem erros ate agora. Continue.');}
function closeGame(){if(window.parent!==window)window.parent.postMessage({type:'BRAINHUNTER_CLOSE'},'*');else location.href='index.html';}
loadPuzzle(1);
</script>
</body>
</html>
