<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Connect Four</title>
<style>
:root{--bg:#060818;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--accent:#ffe66d;--red:#ff6b6b;--blue:#4fc3f7;--text:#c8d8f0;--muted:#6d7f9b;--ok:#00e676;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at top,#152042,var(--bg) 60%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;user-select:none}
.wrap{width:100%;max-width:430px;text-align:center}.close{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:900;cursor:pointer}
h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.sub{color:var(--muted);font-size:.88rem;margin:8px 0 14px;line-height:1.45}
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 18px 60px rgba(0,0,0,.25)}.status{font-weight:800;margin-bottom:12px;color:var(--accent);min-height:22px}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:#102451;border:2px solid rgba(79,195,247,.25);border-radius:18px;padding:10px}
.cell{aspect-ratio:1;border-radius:50%;background:#061126;border:2px solid rgba(255,255,255,.08);box-shadow:inset 0 5px 14px rgba(0,0,0,.45);cursor:pointer;transition:.12s}.cell:hover{outline:2px solid rgba(255,230,109,.4)}.p1{background:radial-gradient(circle at 30% 25%,#fff5b5,var(--accent) 38%,#d49a00 100%)}.p2{background:radial-gradient(circle at 30% 25%,#ffd1d1,var(--red) 38%,#8f1f2f 100%)}
.row{display:flex;gap:10px;margin-top:12px}.btn{flex:1;padding:13px;border:none;border-radius:10px;font-weight:850;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),#f59e0b);color:#1b1300}.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.score{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}.stat{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:12px;padding:9px}.stat b{display:block;color:var(--accent);font-size:1.3rem}.stat span{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
</style>
</head>
<body>
<button class="close" onclick="closeGame()">X</button>
<main class="wrap">
  <h1>Connect Four</h1>
  <p class="sub">Solte suas peças amarelas e conecte quatro antes da IA vermelha.</p>
  <section class="panel">
    <div class="status" id="status">Sua vez: escolha uma coluna.</div>
    <div class="board" id="board"></div>
    <div class="score">
      <div class="stat"><b id="moves">0</b><span>jogadas</span></div>
      <div class="stat"><b id="wins">0</b><span>vitorias</span></div>
      <div class="stat"><b id="losses">0</b><span>derrotas</span></div>
    </div>
    <div class="row"><button class="btn primary" onclick="newGame()">Novo jogo</button><button class="btn secondary" onclick="closeGame()">Voltar</button></div>
  </section>
</main>
<script>
const ROWS=6,COLS=7,H=1,AI=2;let grid=[],locked=false,moves=0,wins=0,losses=0;
function newGame(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));locked=false;moves=0;setStatus('Sua vez: escolha uma coluna.');render();}
function render(){const b=document.getElementById('board');b.innerHTML='';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const d=document.createElement('button');d.className='cell '+(grid[r][c]?'p'+grid[r][c]:'');d.onclick=()=>play(c);b.appendChild(d);}document.getElementById('moves').textContent=moves;document.getElementById('wins').textContent=wins;document.getElementById('losses').textContent=losses;}
function setStatus(t){document.getElementById('status').textContent=t;}
function drop(col,p){for(let r=ROWS-1;r>=0;r--)if(!grid[r][col]){grid[r][col]=p;return r;}return-1;}
function play(col){if(locked)return;const r=drop(col,H);if(r<0)return;moves++;render();if(endCheck(H)){wins++;finish('Voce conectou quatro. Vitoria!');return;}if(full()){finish('Empate. O tabuleiro fechou.');return;}locked=true;setStatus('IA pensando...');setTimeout(aiMove,420);}
function aiMove(){let col=bestMove();drop(col,AI);moves++;render();if(endCheck(AI)){losses++;finish('A IA conectou quatro. Tente bloquear antes.');return;}if(full()){finish('Empate. Ninguem conectou quatro.');return;}locked=false;setStatus('Sua vez: escolha uma coluna.');}
function bestMove(){const valid=[...Array(COLS).keys()].filter(c=>grid[0][c]===0);for(const c of valid){const copy=clone();dropOn(copy,c,AI);if(win(copy,AI))return c;}for(const c of valid){const copy=clone();dropOn(copy,c,H);if(win(copy,H))return c;}valid.sort((a,b)=>scoreCol(b)-scoreCol(a));return valid[0];}
function scoreCol(c){return 8-Math.abs(3-c)*2+Math.random();}
function clone(){return grid.map(r=>r.slice());}
function dropOn(g,col,p){for(let r=ROWS-1;r>=0;r--)if(!g[r][col]){g[r][col]=p;return;}}
function endCheck(p){return win(grid,p);}
function win(g,p){const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(g[r][c]===p)for(const[dR,dC]of dirs){let n=0;for(let k=0;k<4;k++){const rr=r+dR*k,cc=c+dC*k;if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&g[rr][cc]===p)n++;}if(n===4)return true;}return false;}
function full(){return grid[0].every(Boolean);}
function finish(t){locked=true;setStatus(t);}
function closeGame(){if(window.parent!==window)window.parent.postMessage({type:'BRAINHUNTER_CLOSE'},'*');else location.href='index.html';}
newGame();
</script>
</body>
</html>
